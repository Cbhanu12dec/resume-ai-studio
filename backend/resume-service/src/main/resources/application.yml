server:
  port: 8081

spring:
  application:
    name: resume-service
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/resumeai}
    username: ${SPRING_DATASOURCE_USERNAME:resumeai}
    password: ${SPRING_DATASOURCE_PASSWORD:resumeai_secret}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 16
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

local:
  storage:
    path: ${LOCAL_STORAGE_PATH:${user.home}/.resumeai-storage}

ai-service:
  base-url: ${AI_SERVICE_URL:http://localhost:8082}

latex-service:
  base-url: ${LATEX_SERVICE_URL:http://localhost:8083}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    io.netty.resolver.dns.DnsServerAddressStreamProviders: OFF
